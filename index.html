<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Анна Стилист | Салон красоты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .header { text-align: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
        .avatar { font-size: 56px; margin-bottom: 8px; }
        .name { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; color: #2d3748; }
        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            background: white;
        }
        select:focus, input:focus { border-color: #667eea; }
        .time-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .time-btn {
            background: #f8f9ff;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .time-btn:hover { background: #667eea; color: white; }
        .time-btn.selected { background: #667eea; color: white; border-color: #667eea; }
        .time-btn.disabled { background: #f1f3f5; color: #adb5bd; cursor: not-allowed; text-decoration: line-through; }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-submit:hover:not(:disabled) { transform: translateY(-2px); }
        .info-text { font-size: 12px; color: #888; text-align: center; margin-top: 20px; }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 500;
            z-index: 9999;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">✂️</div>
            <div class="name">АННА СТИЛИСТ</div>
            <div style="font-size: 14px; color: #888;">салон красоты в Шахтах</div>
        </div>

        <form id="bookingForm">
            <div class="form-group">
                <label>📋 Услуга</label>
                <select id="service" required>
                    <option value="man_haircut">💇‍♂️ Мужская стрижка — 800₽</option>
                    <option value="woman_haircut">💇‍♀️ Женская стрижка — 1500₽</option>
                    <option value="coloring">🎨 Окрашивание — 3000₽</option>
                    <option value="styling">✨ Укладка — 1000₽</option>
                    <option value="manicure">💅 Маникюр — 1200₽</option>
                </select>
            </div>

            <div class="form-group">
                <label>👤 Мастер</label>
                <select id="master" required>
                    <option value="Анна">Анна</option>
                    <option value="Елена">Елена</option>
                </select>
            </div>

            <div class="form-group">
                <label>📅 Дата</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label>⏰ Время</label>
                <div id="timeSlots" class="time-slots"></div>
            </div>

            <div class="form-group">
                <label>👤 Ваше имя</label>
                <input type="text" id="clientName" placeholder="Как к вам обращаться?" required>
            </div>

            <div class="form-group">
                <label>📱 Telegram (для уведомлений)</label>
                <input type="text" id="clientTelegram" placeholder="@username" required>
            </div>

            <button type="submit" class="btn-submit">✂️ Записаться</button>
        </form>

        <div class="info-text">
            ✂️ После записи вам придёт уведомление в Telegram<br>
            📍 г. Шахты, ул. Советская, 15
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // ВСТАВЬ СВОЙ ТОКЕН БОТА (тот же, что в bot.py)
        const BOT_TOKEN = "8517689872:AAGfe2bFZE932QdzRQfDJu2K_-VYC8phIuY";
        
        let occupiedSlots = {};
        let isSubmitting = false;

        function generateTimeSlots() {
            const slots = [];
            for (let hour = 9; hour <= 20; hour++) {
                if (hour < 20) {
                    slots.push(`${hour.toString().padStart(2, '0')}:00`);
                    slots.push(`${hour.toString().padStart(2, '0')}:30`);
                } else {
                    slots.push(`20:00`);
                }
            }
            return slots;
        }

        function renderTimeSlots(date, master) {
            const container = document.getElementById('timeSlots');
            const slots = generateTimeSlots();
            container.innerHTML = '';
            
            slots.forEach(time => {
                const btn = document.createElement('div');
                btn.className = 'time-btn';
                btn.textContent = time;
                if (occupiedSlots[`${date}_${master}_${time}`]) {
                    btn.classList.add('disabled');
                } else {
                    btn.onclick = () => {
                        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        document.getElementById('selectedTime').value = time;
                    };
                }
                container.appendChild(btn);
            });
            
            if (!document.getElementById('selectedTime')) {
                const hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.id = 'selectedTime';
                document.getElementById('bookingForm').appendChild(hidden);
            }
        }

        function showNotification(message, isError = false) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.backgroundColor = isError ? '#dc2626' : '#d4af37';
            notification.style.color = isError ? 'white' : '#0a0a0a';
            notification.style.opacity = '1';
            setTimeout(() => { notification.style.opacity = '0'; }, 3000);
        }

        async function sendBookingToBot(data) {
            // Отправляем данные прямо в Telegram API (к боту)
            const messageText = `BOOKING_FROM_SITE:${JSON.stringify(data)}`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const payload = {
                chat_id: "anna_style_bot",  // отправляем самому боту
                text: messageText
            };
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.ok) {
                    return true;
                } else {
                    console.error("Telegram API error:", result);
                    return false;
                }
            } catch (error) {
                console.error("Fetch error:", error);
                return false;
            }
        }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isSubmitting) return;
            
            const service = document.getElementById('service').value;
            const master = document.getElementById('master').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('selectedTime').value;
            const clientName = document.getElementById('clientName').value;
            const clientTelegram = document.getElementById('clientTelegram').value;
            
            if (!time) { showNotification('❌ Выберите время', true); return; }
            if (!clientName) { showNotification('❌ Введите имя', true); return; }
            if (occupiedSlots[`${date}_${master}_${time}`]) { showNotification('❌ Время занято', true); return; }
            
            isSubmitting = true;
            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
            btn.disabled = true;
            
            const data = {
                client_name: clientName,
                client_telegram: clientTelegram,
                service: service,
                master: master,
                date: date,
                time: time
            };
            
            const success = await sendBookingToBot(data);
            
            if (success) {
                occupiedSlots[`${date}_${master}_${time}`] = true;
                showNotification('✅ Запись отправлена!');
                document.getElementById('clientName').value = '';
                document.getElementById('clientTelegram').value = '';
                document.getElementById('selectedTime').value = '';
                renderTimeSlots(date, master);
            } else {
                showNotification('❌ Ошибка отправки. Попробуйте позже.', true);
            }
            
            setTimeout(() => {
                isSubmitting = false;
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 2000);
        });
        
        document.getElementById('date').addEventListener('change', () => {
            const date = document.getElementById('date').value;
            const master = document.getElementById('master').value;
            if (date && master) renderTimeSlots(date, master);
        });
        document.getElementById('master').addEventListener('change', () => {
            const date = document.getElementById('date').value;
            const master = document.getElementById('master').value;
            if (date && master) renderTimeSlots(date, master);
        });
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date').min = today;
        renderTimeSlots('', '');
    </script>
</body>
</html>
